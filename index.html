<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Dropship</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .main-container { display: grid; grid-template-columns: 450px 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        
        /* Layout Grid untuk Input Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        
        input { width: 100%; padding: 8px; margin: 5px 0 5px 0; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; box-sizing: border-box; }
        .btn-action { padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-save { background: #05ac2f; }
        .btn-reset { background: #0615e2; }
        .btn-edit { background: #f59e0b; padding: 5px 10px; }
        .btn-del { background: #ef4444; padding: 5px 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }

        #tabelHasil a {color: #38bdf8;font-weight: bold; }
        #tabelHasil a:hover { color: #ffffff; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card">
        <h2>Input Produk</h2>
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="form-grid">
            <div>Nama Produk<input type="text" id="nama" required></div>
            <div>Supplier<input type="text" id="supplier"></div>
            <div>Tipe/Variasi<input type="text" id="tipe"></div>
            <div>Modal<input type="text" id="modal" placeholder="Rp" required></div>
            <div>Harga Jual<input type="text" id="jual" placeholder="Rp" required></div>
            <div>Diskon (%)<input type="number" id="diskon" value="0"></div>
            <div>Admin (Rp)<input type="text" id="admin" value="0" ></div>
            <div>Ongkir (Rp)<input type="text" id="ongkir" value="0"></div>
            <div class="full-width">Link Produk<input type="text" id="link" required></div>
        </div>

        <button class="btn-action btn-save" onclick="simpanData()">Simpan Data</button>
        <button class="btn-action btn-reset" onclick="resetData()">Reset Semua Data</button>
    </div>

    <div>
        <div class="card">
            <h2>Grafik Profit</h2>
            <canvas id="profitChart" height="50"></canvas>
        </div>
        <div class="card">
            <table id="tabelHasil">
                <thead><tr><th>Produk</th><th>Supplier</th><th>Profit</th><th>Status</th><th>Link</th><th>Aksi</th></tr></thead>
                <tbody id="isiTabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Pastikan URL Google Script Anda sudah benar
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6aLfDCcNYga8M8usMfvlNcmfwmIxzBdN1SSLGu4WBH0ZwzynhZ7iNXgts6GGPUlGi/exec";
    let dataList = JSON.parse(localStorage.getItem('dropshipData')) || [];

    function parseCleanNumber(value) {
        let sanitized = value.toString().replace(/\./g, '').replace(',', '.');
        return parseFloat(sanitized) || 0;
    }

    async function simpanData() {
        const editIndex = document.getElementById('editIndex').value;
        const data = {
            nama: document.getElementById('nama').value,
            supplier: document.getElementById('supplier').value,
            tipe: document.getElementById('tipe').value,
            modal: parseCleanNumber(document.getElementById('modal').value),
            jual: parseCleanNumber(document.getElementById('jual').value),
            diskon: parseCleanNumber(document.getElementById('diskon').value),
            admin: parseCleanNumber(document.getElementById('admin').value),
            ongkir: parseCleanNumber(document.getElementById('ongkir').value),
            link: document.getElementById('link').value
        };

        if(!data.nama) return alert("Isi nama produk!");

        const hargaBersih = data.jual - (data.jual * (data.diskon / 100));
        data.profit = hargaBersih - (data.modal + data.admin + data.ongkir);

        if (editIndex === "-1") {
            dataList.push(data);
        } else {
            dataList[editIndex] = data;
            document.getElementById('editIndex').value = "-1";
        }
        
        localStorage.setItem('dropshipData', JSON.stringify(dataList));
        renderTable();
        
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
        } catch(e) { console.error("Sync gagal", e); }

        document.querySelectorAll('input:not([type="hidden"])').forEach(i => i.value = '');
    }

    function renderTable() {
        const tbody = document.getElementById('isiTabel');
        tbody.innerHTML = '';
        dataList.forEach((item, index) => {
            tbody.innerHTML += `<tr>
                <td>${item.nama}</td><td>${item.supplier}</td>
                <td style="color:${item.profit>=0?'#4ade80':'#f87171'}">Rp ${item.profit.toLocaleString()}</td>
                <td>${item.profit >= 0 ? "Untung" : "Rugi"}</td>
                <td><a href="${item.link}" target="_blank">Link</a></td>
                <td>
                    <button class="btn-edit" onclick="editData(${index})">Edit</button>
                    <button class="btn-del" onclick="hapusData(${index})">Hapus</button>
                </td>
            </tr>`;
        });
        updateChart();
    }

    function editData(index) {
        const item = dataList[index];
        document.getElementById('nama').value = item.nama;
        document.getElementById('supplier').value = item.supplier;
        document.getElementById('tipe').value = item.tipe;
        document.getElementById('modal').value = item.modal;
        document.getElementById('jual').value = item.jual;
        document.getElementById('diskon').value = item.diskon;
        document.getElementById('admin').value = item.admin;
        document.getElementById('ongkir').value = item.ongkir;
        document.getElementById('link').value = item.link;
        document.getElementById('editIndex').value = index;
    }

    async function hapusData(index) {
        if (!confirm("Yakin hapus?")) return;
        dataList.splice(index, 1);
        localStorage.setItem('dropshipData', JSON.stringify(dataList));
        renderTable();
    }

    function resetData() {
        if(confirm("Yakin hapus semua data?")) {
            localStorage.removeItem('dropshipData');
            dataList = [];
            renderTable();
        }
    }

    const ctx = document.getElementById('profitChart').getContext('2d');
    let profitChart = new Chart(ctx, { type: 'bar', data: { labels: [], datasets: [{ label: 'Profit', data: [], backgroundColor: '#05ac2f' }] } });

    function updateChart() {
        profitChart.data.labels = dataList.map(i => i.nama);
        profitChart.data.datasets[0].data = dataList.map(i => i.profit);
        profitChart.update();
    }

    window.onload = renderTable;
</script>
</body>
</html>
