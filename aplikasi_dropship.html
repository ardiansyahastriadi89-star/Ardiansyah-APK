<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Dropship</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .main-container { display: grid; grid-template-columns: 450px 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        
        /* Layout Grid untuk Input Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        
        input { width: 100%; padding: 8px; margin: 5px 0 5px 0; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; box-sizing: border-box; }
        .btn-action { padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-save { background: #036bf3; }
        .btn-reset { background: #05ac2f; }
        .btn-edit { background: #f59e0b; padding: 5px 10px; }
        .btn-del { background: #ef4444; padding: 5px 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }

        #tabelHasil a {color: #38bdf8;font-weight: bold; }
        #tabelHasil a:hover { color: #ffffff; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card">
        <h2>Input Produk</h2>
        <input type="hidden" id="editIndex" value="-1">

        <div id="previewArea" style="text-align: center; margin-top: 5px; padding: 5px; background: #1e293b; border-radius: 3px; border: 2px solid #f8ac08; display: none;">
    <div style="font-size: 0.9em; color: #e7eaee; text-transform: uppercase; letter-spacing: 1px;">
        Estimasi Profit
    </div>
    <div id="previewProfit" style="font-size: 1.5em; font-weight: bold; color: #4ade80; margin-top: 5px;">
        Rp 0
    </div>
</div>
        
        <div class="form-grid">
            <div>Nama Produk<input type="text" id="nama" required></div>
            <div>Supplier<input type="text" id="supplier"></div>
            <div>Tipe/Variasi<input type="text" id="tipe"></div>
            <div>Modal<input type="text" id="modal" placeholder="Rp" required></div>
            <div>Harga Jual<input type="text" id="jual" placeholder="Rp" required></div>
            <div>Diskon (%)<input type="number" id="diskon" value="0"></div>
            <div>Admin (Rp)<input type="text" id="admin" value="0" ></div>
            <div>Ongkir (Rp)<input type="text" id="ongkir" value="0"></div>
            <div class="full-width">Link Supplier<input type="text" id="linksupplier" required></div>
            <div class="full-width">Link Toko<input type="text" id="linktoko" required></div>
        </div>

        <button class="btn-action btn-save" onclick="simpanData()">Simpan Data</button>
        
        <button class="btn-action btn-reset" onclick="resetData()">Reset Semua Data</button>
    </div>
         
        <div class="card">
            <table id="tabelHasil">
                <thead><tr><th>Produk</th><th>Supplier</th><th>Tipe</th><th>Profit</th><th>Status</th><th>Link Supplier</th><th>Link Toko</th><th>Aksi</th></tr></thead>
                <tbody id="isiTabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6aLfDCcNYga8M8usMfvlNcmfwmIxzBdN1SSLGu4WBH0ZwzynhZ7iNXgts6GGPUlGi/exec";
    let dataList = JSON.parse(localStorage.getItem('dropshipData')) || [];
    let currentPage = 1;
    const rowsPerPage = 7;

    function parseCleanNumber(value) {
        let sanitized = value.toString().replace(/\./g, '').replace(',', '.');
        return parseFloat(sanitized) || 0;
    }

  async function simpanData() {
    const editIndex = document.getElementById('editIndex').value;
    const data = {
        nama: document.getElementById('nama').value,
        supplier: document.getElementById('supplier').value,
        tipe: document.getElementById('tipe').value,
        modal: parseCleanNumber(document.getElementById('modal').value),
        jual: parseCleanNumber(document.getElementById('jual').value),
        diskon: parseCleanNumber(document.getElementById('diskon').value),
        admin: parseCleanNumber(document.getElementById('admin').value),
        ongkir: parseCleanNumber(document.getElementById('ongkir').value),
        linksupplier: document.getElementById('linksupplier').value,
        linktoko: document.getElementById('linktoko').value
    };

    if(!data.nama) return alert("Isi nama produk!");
    if(!data.modal) return alert("Isi harga modal!");
    if(!data.linksupplier) return alert("Isi link supplier!");

    const hargaBersih = data.jual - (data.jual * (data.diskon / 100));
    data.profit = hargaBersih - (data.modal + data.admin + data.ongkir);

    if (editIndex === "-1") dataList.push(data);
    else { dataList[editIndex] = data; document.getElementById('editIndex').value = "-1"; }
    
    localStorage.setItem('dropshipData', JSON.stringify(dataList));
    renderTable();
    
    // --- PERBAIKAN DI SINI ---
    try {
        const formData = new FormData();
        for (const key in data) {
            formData.append(key, data[key]);
        }

        await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: formData 
        });
        alert("Data berhasil tersinkronisasi!");
    } catch(e) { 
        console.error("Sync gagal", e);
        alert("Gagal sinkronisasi ke Spreadsheet");
    }

    document.querySelectorAll('input:not([type="hidden"])').forEach(i => i.value = '');
}

// Tambahkan event listener untuk memantau ketikan
['modal', 'jual', 'diskon', 'admin', 'ongkir'].forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
});

function updatePreview() {
    const modal = parseCleanNumber(document.getElementById('modal').value);
    const jual = parseCleanNumber(document.getElementById('jual').value);
    const diskon = parseCleanNumber(document.getElementById('diskon').value);
    const admin = parseCleanNumber(document.getElementById('admin').value);
    const ongkir = parseCleanNumber(document.getElementById('ongkir').value);

    const hargaBersih = jual - (jual * (diskon / 100));
    const profit = hargaBersih - (modal + admin + ongkir);

    const previewArea = document.getElementById('previewArea');
    const previewProfit = document.getElementById('previewProfit');

    if (jual > 0) {
        previewArea.style.display = 'block';
        previewProfit.innerText = 'Rp ' + profit.toLocaleString();
        previewProfit.style.color = profit >= 0 ? '#4ade80' : '#f87171';
    } else {
        previewArea.style.display = 'none';
    }
}

    function renderTable() {
    const tbody = document.getElementById('isiTabel');
    tbody.innerHTML = '';
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const paginatedItems = dataList.slice(start, end);
    paginatedItems.forEach((item, index) => {
        const actualIndex = start + index; 
        tbody.innerHTML += `<tr>
            <td>${item.nama}</td><td>${item.supplier}</td><td>${item.tipe}</td>
            <td style="color:${item.profit>=0?'#4ade80':'#f87171'}">Rp ${item.profit.toLocaleString()}</td>
            <td>${item.profit >= 0 ? "Untung" : "Rugi"}</td>
            <td><a href="${item.linksupplier}" target="_blank">Link</a></td>
            <td><a href="${item.linktoko}" target="_blank">Link</a></td>
            <td>
                <button class="btn-edit" onclick="editData(${actualIndex})">Edit</button>
                <button class="btn-del" onclick="hapusData(${actualIndex})">Hapus</button>
            </td>
        </tr>`;
    });
    
    renderPagination();
}

function renderPagination() {
    const pageCount = Math.ceil(dataList.length / rowsPerPage);
    let nav = '<div style="margin-top:15px; text-align:center;">';
    for(let i = 1; i <= pageCount; i++) {
        nav += `<button onclick="changePage(${i})" style="margin:2px; padding:5px 10px; cursor:pointer; background:${currentPage===i?'#036bf3':'#334155'}; color:white; border:none; border-radius:4px;">${i}</button>`;
    }
    nav += '</div>';
    document.getElementById('tabelHasil').insertAdjacentHTML('afterend', nav);
}

function changePage(page) {
    currentPage = page;
    renderTable();
    const oldNav = document.querySelector('div[style*="margin-top:15px"]');
    if(oldNav) oldNav.remove();
}
    
    function editData(index) {
        const item = dataList[index];
        document.getElementById('nama').value = item.nama;
        document.getElementById('supplier').value = item.supplier;
        document.getElementById('tipe').value = item.tipe;
        document.getElementById('modal').value = item.modal;
        document.getElementById('jual').value = item.jual;
        document.getElementById('diskon').value = item.diskon;
        document.getElementById('admin').value = item.admin;
        document.getElementById('ongkir').value = item.ongkir;
        document.getElementById('linksupplier').value = item.linksupplier;
        document.getElementById('linktoko').value = item.linktoko;
        document.getElementById('editIndex').value = index;
    }

    async function hapusData(index) {
    if (!confirm("Yakin hapus?")) return;
    dataList.splice(index, 1);
    if (currentPage > 1 && (currentPage - 1) * rowsPerPage >= dataList.length) {
        currentPage--;
    }
    localStorage.setItem('dropshipData', JSON.stringify(dataList));
    renderTable();
}

    function resetData() {
        if(confirm("Yakin hapus semua data?")) {
            localStorage.removeItem('dropshipData');
            dataList = [];
            renderTable();
        }
    }

    window.onload = renderTable;
</script>
</body>
</html>
